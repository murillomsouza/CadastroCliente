<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Usuários</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
        }
        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
        }
        .content {
            margin-left: 220px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="bg-dark text-white sidebar p-3">
        <h4 class="text-center">Sistema</h4>
        <hr>

        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="{{ url_for('index') }}" class="nav-link text-white">
                    🏠 Início
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('cadastro') }}" class="nav-link text-white">
                    ➕ Cadastrar Usuário
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('lista') }}" class="nav-link text-white">
                    📋 Listar Usuários
                </a>
            </li>
        </ul>
    </div>

    <div class="content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="container mt-3">
                    {% for categoria, mensagem in messages %}
                        <div class="alert alert-{{ categoria }} alert-dismissible fade show" role="alert">
                            {{ mensagem }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
